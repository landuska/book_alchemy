<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>All Authors</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="main-wrapper">
        <a href="{{ url_for('home') }}" class="btn" style="background-color: #95a5a6; margin-bottom: 20px;">⬅ Back to list</a>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="margin: 0;">👥 All Authors</h1>
            <a href="{{ url_for('add_author') }}" class="btn">✍️ Add Author</a>
        </div>

        {% for item in authors %}
        <div class="book-card" style="display: block;">
            <h3 style="margin-top: 0; color: #2c3e50;">{{ item.author.name }}</h3>
            <p style="margin-bottom: 5px;"><strong>Books by this author:</strong></p>
            <ul style="margin-top: 5px; padding-left: 20px; color: #555;">
              {% for book in item.books %}
                <li style="margin-bottom: 5px;">{{ book }}</li>
              {% else %}
                <li style="color: #95a5a6;">No books found for this author.</li>
              {% endfor %}
            </ul>
        </div>
        {% endfor %}
    </div>
  </body>
</html>
