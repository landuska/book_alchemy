<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>500 - Server Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-container {
            text-align: center;
            padding: 40px 10px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            margin: 0;
            color: #f39c12; /* Оранжевый цвет для серверной ошибки */
            line-height: 1;
        }
        .error-title {
            font-size: 28px;
            color: var(--secondary-color);
            margin: 10px 0 20px 0;
        }
        .error-message {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }
    </style>
  </head>
<body>
   <div class="main-wrapper">
        <div class="error-container">
            <h1 class="error-code">500</h1>
            <h2 class="error-title">Ouch! Something went wrong</h2>
            <p class="error-message">We're experiencing an internal server problem.<br>Please try again later or contact the administrator.</p>
            <a href="{{ url_for('home') }}" class="btn">🔙 Return to Main Page</a>
        </div>
    </div>
</body>
</html>
